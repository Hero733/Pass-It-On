<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass It On @ NTUN | iOS Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            font-family: 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body { margin: 0; padding: 0; min-height: 100vh; background-color: #F2F2F7; color: #1C1C1E; overflow-x: hidden; }
        
        /* สไตล์ Glassmorphism สไตล์ iOS */
        .glass-nav {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            border-radius: 28px;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 0.5px solid rgba(0, 0, 0, 0.05);
            border-radius: 16px;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.2);
        }
        
        /* พื้นหลังแบบ iOS Abstract Bubble Gradient */
        .bg-blob-1 { position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw; background: #FFD6E8; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.7; }
        .bg-blob-2 { position: fixed; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #C8E6C9; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.8; }
        .bg-blob-3 { position: fixed; top: 40%; left: 30%; width: 40vw; height: 40vw; background: #D0D8FF; border-radius: 50%; filter: blur(90px); z-index: -1; opacity: 0.6; }

        /* ตั้งค่าซ่อนหน้าจอเริ่มต้น */
        #app-content, #admin-panel { display: none; }
    </style>
</head>
<body>

    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>
    <div class="bg-blob-3"></div>

    <nav class="sticky top-0 z-50 glass-nav px-6 py-3 flex justify-between items-center transition-all">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-[#34C759] to-[#28A745] rounded-[14px] flex items-center justify-center text-white shadow-sm shadow-green-200">
                <span class="text-xl">♻️</span>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-none tracking-tight">Pass It On</h1>
                <span class="text-[10px] uppercase tracking-widest text-[#34C759] font-bold">NTUN Campus</span>
            </div>
        </div>
        
        <div id="auth-section">
            <div id="g_id_onload" 
                 data-client_id="802485672001-m60k218jeo6ege6ceotavbfrl6nhl8k4.apps.googleusercontent.com" 
                 data-callback="handleSignIn"
                 data-auto_select="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-size="large"></div>
        </div>
    </nav>

    <main class="max-w-[1000px] mx-auto px-4 py-10">
        
        <div id="login-placeholder" class="text-center py-20 animate-fade-in">
            <div class="w-28 h-28 glass-card flex items-center justify-center text-5xl mx-auto mb-8 shadow-sm shadow-black/5">🔐</div>
            <h2 class="text-3xl font-bold mb-3 tracking-tight">เข้าใช้งานสำหรับนักเรียน</h2>
            <p class="text-gray-500 mb-8 max-w-sm mx-auto text-sm leading-relaxed">กรุณาล็อกอินด้วยอีเมล @ntun.ac.th เพื่อยืนยันตัวตนก่อนเข้าสู่ระบบ</p>
        </div>

        <section id="admin-panel" class="mb-10 p-6 bg-[#1C1C1E] rounded-[32px] text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold flex items-center gap-2">Admin Dashboard</h2>
                    <span class="text-[10px] bg-white/10 px-3 py-1 rounded-full uppercase tracking-wide">ส่วนควบคุมสูงสุด</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white/5 p-5 rounded-[24px] border border-white/10">
                        <p class="text-sm font-medium mb-3">เพิ่มแอดมินใหม่</p>
                        <div class="flex gap-2">
                            <input type="email" id="new-admin-email" placeholder="example@ntun.ac.th" class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-4 py-2 text-sm text-white placeholder-gray-400 outline-none focus:border-[#34C759] transition">
                            <button onclick="addAdmin()" class="bg-white text-black px-4 py-2 rounded-2xl text-sm font-semibold hover:bg-[#34C759] hover:text-white transition">เพิ่ม</button>
                        </div>
                    </div>
                    <div class="bg-white/5 p-5 rounded-[24px] border border-white/10">
                        <p class="text-sm font-medium mb-3">รายชื่อทีมแอดมิน</p>
                        <ul id="admin-list" class="flex flex-wrap gap-2"></ul>
                    </div>
                </div>
            </div>
        </section>

        <div id="app-content">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                
                <div class="md:col-span-5 lg:col-span-4">
                    <div class="glass-card p-6 sticky top-24">
                        <h3 class="text-xl font-bold mb-5 tracking-tight text-black">ส่งต่อของวันนี้ 🎁</h3>
                        <form id="post-form" onsubmit="handlePost(event)">
                            <div class="space-y-4">
                                <div>
                                    <input type="text" id="itemName" required class="w-full glass-input px-4 py-3.5 text-sm transition-all" placeholder="ชื่อสิ่งของ (เช่น หนังสือ, เสื้อพละ)">
                                </div>
                                <div>
                                    <select id="itemCat" class="w-full glass-input px-4 py-3.5 text-sm transition-all text-gray-700">
                                        <option>📚 หนังสือเรียน</option>
                                        <option>👕 ชุดนักเรียน</option>
                                        <option>✏️ อุปกรณ์การเรียน</option>
                                        <option>📦 อื่นๆ</option>
                                    </select>
                                </div>
                                <div>
                                    <textarea id="itemDetail" rows="3" required class="w-full glass-input px-4 py-3.5 text-sm transition-all resize-none" placeholder="รายละเอียดและจุดนัดรับ..."></textarea>
                                </div>
                                <button type="submit" class="w-full bg-black text-white font-semibold py-3.5 rounded-2xl hover:bg-[#34C759] shadow-lg shadow-black/10 transition-all active:scale-[0.98]">
                                    แชร์ลงแพลตฟอร์ม
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="md:col-span-7 lg:col-span-8">
                    <div class="flex justify-between items-center mb-6 px-2">
                        <h3 class="text-xl font-bold tracking-tight text-black">รายการส่งต่อ</h3>
                    </div>
                    <div id="feed" class="flex flex-col gap-4">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const MASTER_ADMIN = "aceaa372@gmail.com";
        const SCHOOL_DOMAIN = "ntun.ac.th";
        const FORBIDDEN_KEYWORDS = ["ยาบ้า", "ยาไอซ์", "กัญชา", "บุหรี่", "เหล้า", "เบียร์", "ปืน", "มีด", "กางเกงใน", "ยกทรง", "บรา", "ชุดชั้นใน", "กางเกงลิง", "underwear", "bra", "เซ็กส์", "sex", "พนัน", "หวย"];

        let posts = [];
        let admins = [MASTER_ADMIN];
        let currentUser = null;

        try {
            const savedPosts = localStorage.getItem('ntun_posts');
            const savedAdmins = localStorage.getItem('ntun_admins');
            if (savedPosts) posts = JSON.parse(savedPosts);
            if (savedAdmins) admins = JSON.parse(savedAdmins);
        } catch(e) { console.error("Storage Error", e); }

        // ==========================================
        // 1. ระบบยืนยันตัวตน (แก้ปัญหาภาษาไทย 100%)
        // ==========================================
        function handleSignIn(response) {
            try {
                // ใช้ TextDecoder เพื่อถอดรหัส UTF-8 (แก้ปัญหาชื่อภาษาไทยเป็นภาษาต่างดาว)
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const binaryString = atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const decoder = new TextDecoder('utf-8');
                const payload = JSON.parse(decoder.decode(bytes));
                
                const email = payload.email;
                const domain = payload.hd || email.split('@')[1]; 

                if (domain === SCHOOL_DOMAIN || email === MASTER_ADMIN) {
                    currentUser = payload;
                    
                    document.getElementById('auth-section').innerHTML = `
                        <div class="flex items-center gap-2 glass-card pl-1.5 pr-4 py-1.5 shadow-sm">
                            <img src="${payload.picture}" class="w-8 h-8 rounded-full" referrerpolicy="no-referrer">
                            <div class="text-left hidden sm:block">
                                <p class="text-[11px] font-bold text-black leading-tight">${payload.name}</p>
                                <p class="text-[9px] text-gray-500 leading-tight">${payload.email}</p>
                            </div>
                            <button onclick="location.reload()" class="ml-2 w-6 h-6 rounded-full bg-black/5 text-gray-600 hover:bg-red-100 hover:text-red-500 flex items-center justify-center transition text-xs">✕</button>
                        </div>
                    `;
                    unlockApp();
                } else {
                    alert(`❌ ไม่อนุญาตให้เข้าใช้งาน\nต้องใช้อีเมล @${SCHOOL_DOMAIN} เท่านั้น`);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                alert("เกิดข้อผิดพลาดในการดึงข้อมูลจาก Google");
            }
        }

        function unlockApp() {
            document.getElementById('login-placeholder').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            if (admins.includes(currentUser.email)) {
                document.getElementById('admin-panel').style.display = 'block';
                renderAdminList();
            }
            renderFeed();
        }

        // ==========================================
        // 2. ระบบจัดการแอดมิน
        // ==========================================
        function addAdmin() {
            const emailInput = document.getElementById('new-admin-email');
            const email = emailInput.value.trim().toLowerCase();
            if (!email) return;
            if (!admins.includes(email)) {
                admins.push(email);
                localStorage.setItem('ntun_admins', JSON.stringify(admins));
                renderAdminList();
                emailInput.value = "";
            }
        }

        function renderAdminList() {
            const list = document.getElementById('admin-list');
            list.innerHTML = admins.map(email => `
                <li class="bg-white/10 px-3 py-1.5 rounded-full border border-white/10 flex items-center gap-2 text-[11px] font-medium text-gray-200">
                    ${email} ${email !== MASTER_ADMIN ? `<button onclick="removeAdmin('${email}')" class="text-red-400 font-bold ml-1 hover:scale-110 transition">✕</button>` : '👑'}
                </li>
            `).join('');
        }

        function removeAdmin(email) {
            if (confirm("ลบแอดมิน?")) {
                admins = admins.filter(a => a !== email);
                localStorage.setItem('ntun_admins', JSON.stringify(admins));
                renderAdminList();
                if (email === currentUser.email) location.reload();
            }
        }

        // ==========================================
        // 3. ระบบโพสต์ และ ระบบจอง (Reserve System)
        // ==========================================
        function handlePost(e) {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const detail = document.getElementById('itemDetail').value;
            const cat = document.getElementById('itemCat').value;

            const fullText = (name + " " + detail).toLowerCase();
            if (FORBIDDEN_KEYWORDS.some(word => fullText.includes(word.toLowerCase()))) {
                alert("🚨 ตรวจพบคำไม่เหมาะสม ไม่อนุญาตให้โพสต์");
                return;
            }

            const newPost = {
                id: Date.now(),
                user: currentUser.name,
                email: currentUser.email,
                avatar: currentUser.picture,
                name: name,
                detail: detail,
                cat: cat,
                date: new Date().toLocaleDateString('th-TH'),
                status: 'available', // สถานะ: available, reserved, completed
                reservedBy: null
            };

            posts.unshift(newPost);
            saveData();
            document.getElementById('post-form').reset();
            renderFeed();
        }

        // ฟังก์ชันกดจอง
        function reservePost(id) {
            const post = posts.find(p => p.id === id);
            if(post.email === currentUser.email) {
                return alert("คุณไม่สามารถจองของตัวเองได้ครับ");
            }
            if (confirm(`ยืนยันการจอง "${post.name}" ใช่หรือไม่?\nกรุณาติดต่อนัดรับของกับเจ้าของโพสต์`)) {
                post.status = 'reserved';
                post.reservedBy = currentUser.name;
                saveData();
                renderFeed();
            }
        }

        // ฟังก์ชันยืนยันส่งมอบ (เฉพาะเจ้าของโพสต์)
        function confirmDelivery(id) {
            const post = posts.find(p => p.id === id);
            if (confirm(`ยืนยันว่าส่งมอบ "${post.name}" ให้กับ ${post.reservedBy} เรียบร้อยแล้ว?`)) {
                post.status = 'completed';
                saveData();
                renderFeed();
            }
        }

        function deletePost(id) {
            if (confirm("ลบโพสต์นี้หรือไม่?")) {
                posts = posts.filter(p => p.id !== id);
                saveData();
                renderFeed();
            }
        }

        function saveData() {
            localStorage.setItem('ntun_posts', JSON.stringify(posts));
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const isAdmin = admins.includes(currentUser.email);
            
            if (posts.length === 0) {
                feed.innerHTML = '<div class="p-10 text-center text-gray-400 glass-card">ยังไม่มีรายการส่งต่อครับ</div>';
                return;
            }

            feed.innerHTML = posts.map(post => {
                const isOwner = post.email === currentUser.email;
                
                // ตรวจสอบสถานะเพื่อกำหนด UI ของการ์ด
                let cardStyle = "glass-card p-5 transition-all duration-300";
                let actionBtn = "";
                
                if (post.status === 'completed') {
                    // สถานะ: ส่งมอบสำเร็จ (ซ่อนหรือทำให้จางสุดๆ)
                    cardStyle += " opacity-40 grayscale";
                    actionBtn = `<span class="text-xs font-bold text-[#34C759] bg-green-100 px-3 py-1.5 rounded-full">ส่งมอบสำเร็จแล้ว</span>`;
                } 
                else if (post.status === 'reserved') {
                    // สถานะ: ถูกจองแล้ว (บัตรสีขาว/จางๆ ขาวโพลน จองซ้ำไม่ได้)
                    cardStyle = "bg-white/90 backdrop-blur-3xl border border-white p-5 rounded-[28px] opacity-70";
                    if (isOwner) {
                        // ถ้าเป็นเจ้าของ ให้มีปุ่มกดยืนยันการส่งมอบ
                        actionBtn = `<button onclick="confirmDelivery(${post.id})" class="text-xs font-bold bg-[#34C759] hover:bg-green-600 text-white px-4 py-2 rounded-full shadow-md transition active:scale-95 animate-pulse">ยืนยันว่าให้ของแล้ว</button>`;
                    } else {
                        // คนอื่นมองเห็นว่าจองแล้ว
                        actionBtn = `<span class="text-xs font-bold text-gray-500 bg-gray-100 px-4 py-2 rounded-full">จองแล้วโดยคุณ ${post.reservedBy}</span>`;
                    }
                } 
                else {
                    // สถานะ: ว่าง (Available)
                    actionBtn = `<button onclick="reservePost(${post.id})" class="text-xs font-bold bg-black hover:bg-[#34C759] text-white px-4 py-2 rounded-full shadow-md transition active:scale-95">สนใจจอง</button>`;
                }

                return `
                <div class="${cardStyle}">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] font-bold bg-black/5 text-black/60 px-3 py-1 rounded-full uppercase tracking-wider">${post.cat}</span>
                        ${isAdmin || isOwner ? `<button onclick="deletePost(${post.id})" class="text-red-400 hover:bg-red-50 text-[10px] font-bold px-2 py-1 rounded-lg transition">ลบ</button>` : ''}
                    </div>
                    <h4 class="text-lg font-bold text-black mb-1">${post.name}</h4>
                    <p class="text-sm text-gray-600 mb-4 line-clamp-2">${post.detail}</p>
                    
                    <div class="pt-3 flex items-center justify-between border-t border-black/5">
                        <div class="flex items-center gap-2">
                            <img src="${post.avatar}" class="w-6 h-6 rounded-full border border-white/50" referrerpolicy="no-referrer">
                            <div class="leading-none">
                                <span class="block text-[11px] font-semibold text-black">${post.user}</span>
                                <span class="block text-[9px] text-gray-400 mt-0.5">${post.date}</span>
                            </div>
                        </div>
                        ${actionBtn}
                    </div>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
