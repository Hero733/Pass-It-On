<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass It On | NTUN Sharing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { font-family: 'Noto Sans Thai', sans-serif; }
        body { background-color: #fbfbfd; color: #1d1d1f; overflow-x: hidden; }

        /* 🌑 Navbar สีดำแบบกระจก (Dark Glass) */
        .nav-black { 
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: saturate(180%) blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        /* 💊 ปุ่มสถานะ (Active Pill) */
        /* เมื่อกดอยู่หน้านั้นๆ ปุ่มจะเป็นสีขาวตัวหนังสือดำ */
        .nav-link.active { 
            background-color: #ffffff; 
            color: #000000 !important; 
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }
        .nav-link { 
            color: #a1a1a6; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-link:hover:not(.active) { color: #ffffff; }

        /* การ์ดแบบใหม่ คลีนๆ */
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); 
            border-radius: 28px; 
            border: 1px solid #ffffff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            transition: all 0.4s ease;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.06); }

        .bg-blobs { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.4; }
        .blob-1 { top: -10%; right: -10%; width: 400px; height: 400px; background: #e0e7ff; }
        .blob-2 { bottom: -10%; left: -10%; width: 500px; height: 500px; background: #f3e8ff; }

        @keyframes floatCat { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-20px) rotate(2deg); } }
        .cat-animation { animation: floatCat 6s ease-in-out infinite; }
        
        .page-enter { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#fbfbfd]">

    <div class="bg-blobs">
        <div class="blob blob-1"></div><div class="blob blob-2"></div>
    </div>

    <nav class="sticky top-0 z-[1000] nav-black px-4 md:px-8 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="photo/logo.png" class="w-8 h-8 object-contain brightness-0 invert" onerror="this.src='https://via.placeholder.com/32/FFFFFF/000000?text=P';">
            <span class="text-white font-bold text-lg hidden md:block">Pass It On</span>
        </div>

        <div id="nav-actions" class="hidden flex gap-1 md:gap-2">
            <button id="btn-landing" onclick="switchPage('landing')" class="nav-link px-4 py-2 rounded-full text-sm font-medium">หน้าแรก</button>
            <button id="btn-app" onclick="switchPage('app')" class="nav-link px-4 py-2 rounded-full text-sm font-medium">กระดาน</button>
            <button onclick="openModal('modal-guide')" class="nav-link px-4 py-2 rounded-full text-sm font-medium">คู่มือ</button>
            <button onclick="openModal('modal-history')" class="nav-link px-4 py-2 rounded-full text-sm font-medium">ประวัติ</button>
        </div>

        <div id="auth-section">
            <div id="g_id_onload" data-client_id="802485672001-m60k218jeo6ege6ceotavbfrl6nhl8k4.apps.googleusercontent.com" data-callback="handleSignIn"></div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black"></div>
        </div>
    </nav>

    <main class="max-w-[1200px] mx-auto px-4 md:px-8">
        
        <section id="page-landing" class="min-h-[80vh] flex flex-col md:flex-row items-center justify-center gap-10 md:gap-20 py-10">
            <div class="w-64 md:w-[450px] cat-animation shrink-0">
                <img src="photo/cat.png" alt="Mascot" class="w-full h-auto drop-shadow-2xl" onerror="this.src='https://via.placeholder.com/400x400/e0e7ff/4338ca?text=คัดลอกรูปไปใส่ในโฟลเดอร์+photo';">
            </div>

            <div class="flex flex-col items-center md:items-start text-center md:text-left">
                <span class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-xs font-bold mb-4">NTUN SHARING SPACE</span>
                <h1 class="text-5xl md:text-7xl font-black text-[#1d1d1f] leading-tight mb-6">
                    แบ่งปัน<br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">สร้างคุณค่าใหม่</span>
                </h1>
                <p class="text-gray-500 text-lg mb-8 max-w-md">ระบบส่งต่อสิ่งของสำหรับนักเรียน นนทรีวิทยา ล็อกอินเพื่อเริ่มแบ่งปันสิ่งดีๆ ให้เพื่อน</p>
                <button onclick="switchPage('app')" class="px-10 py-4 bg-[#1d1d1f] text-white rounded-full font-bold shadow-xl hover:scale-105 transition-transform">เริ่มใช้งานเลย 🚀</button>
            </div>
        </section>

        <section id="page-app" class="hidden py-10 page-enter">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="w-full lg:w-1/3 lg:sticky lg:top-24 h-fit">
                    <div class="glass-card p-6">
                        <h2 class="text-2xl font-black mb-6">ลงของส่งต่อ 📦</h2>
                        <form id="post-form" onsubmit="handlePost(event)" class="space-y-4">
                            <div onclick="document.getElementById('itemImage').click()" class="w-full h-44 bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center cursor-pointer hover:bg-white transition-all overflow-hidden relative group">
                                <input type="file" id="itemImage" accept="image/*" class="hidden" onchange="previewImage(this)">
                                <div id="preview-placeholder" class="text-center">
                                    <span class="text-3xl">📸</span>
                                    <p class="text-xs font-bold text-gray-400 mt-2">คลิกเพื่อเพิ่มรูปภาพ</p>
                                </div>
                                <img id="image-preview-el" class="hidden w-full h-full object-cover">
                            </div>
                            <input type="text" id="itemName" required placeholder="ชื่อสิ่งของ" class="w-full bg-gray-50 border-none rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-indigo-400">
                            <textarea id="itemDesc" rows="2" placeholder="รายละเอียด (สภาพ, ตำหนิ)" class="w-full bg-gray-50 border-none rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
                            <select id="itemCat" class="w-full bg-gray-50 border-none rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-indigo-400">
                                <option value="📚 หนังสือ / ชีท">📚 หนังสือ / ชีท</option>
                                <option value="👕 เครื่องแต่งกาย">👕 เครื่องแต่งกาย</option>
                                <option value="✏️ อุปกรณ์การเรียน">✏️ อุปกรณ์การเรียน</option>
                                <option value="💻 อุปกรณ์ไอที">💻 อุปกรณ์ไอที</option>
                                <option value="📦 อื่นๆ">📦 อื่นๆ</option>
                            </select>
                            <input type="text" id="itemContact" required placeholder="ข้อมูลติดต่อ (Line, FB)" class="w-full bg-gray-50 border-none rounded-xl px-4 py-3.5 outline-none focus:ring-2 focus:ring-indigo-400">
                            <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-black/20 transition-all">ประกาศส่งต่อ</button>
                        </form>
                    </div>
                </div>

                <div class="w-full lg:w-2/3">
                    <div class="flex gap-2 overflow-x-auto pb-4 mb-4 no-scrollbar" id="filter-container">
                        <button onclick="setFilter('ทั้งหมด')" class="cat-btn active px-6 py-2 bg-black text-white rounded-full text-sm font-bold shadow-md">ทั้งหมด</button>
                        </div>
                    <div id="feed-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                        </div>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-history" class="fixed inset-0 z-[2000] hidden items-center justify-center bg-black/40 backdrop-blur-md p-4">
        <div class="bg-white w-full max-w-xl rounded-[32px] p-8 relative shadow-2xl">
            <button onclick="closeModal('modal-history')" class="absolute top-6 right-6 text-gray-400 hover:text-black font-bold">✕ Close</button>
            <h2 class="text-2xl font-black mb-6">ประวัติการใช้งาน 📁</h2>
            <div id="history-list" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
