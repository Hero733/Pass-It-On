<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass It On | Ultra Fluid OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { font-family: 'Noto Sans Thai', -apple-system, sans-serif; }
        body { background: #f2f2f7; color: #1d1d1f; -webkit-font-smoothing: antialiased; }
        .glass-nav { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(40px) saturate(200%); border-bottom: 1px solid rgba(255, 255, 255, 0.5); }
        .ios-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,1); border-radius: 32px; box-shadow: 0 12px 40px -10px rgba(0,0,0,0.05); transition: all 0.4s; }
        .ios-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px -12px rgba(0,0,0,0.1); }
        .btn-ios:active { transform: scale(0.94); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        #app-content, #admin-panel, #history-modal { display: none; }
        .cat-btn { white-space: nowrap; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; background: white; border: 1px solid #e5e7eb; color: #4b5563; transition: all 0.2s; }
        .cat-btn.active { background: #1d1d1f; color: white; border-color: #1d1d1f; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-modal { animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="overflow-x-hidden relative">

    <div class="fixed top-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-indigo-300/30 rounded-full blur-[140px] z-[-1]"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-emerald-300/30 rounded-full blur-[120px] z-[-1]"></div>

    <nav class="sticky top-0 z-[100] glass-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-gradient-to-br from-gray-900 to-gray-700 rounded-[14px] flex items-center justify-center text-white shadow-md font-bold text-xl">P</div>
            <div>
                <h1 class="text-xl font-bold tracking-tight leading-none text-gray-900">Pass It On</h1>
            </div>
            <a href="guide.html" class="ml-4 text-xs font-semibold text-gray-500 hover:text-black underline">คู่มือ</a>
        </div>
        <div id="auth-section">
            <div id="g_id_onload" data-client_id="802485672001-m60k218jeo6ege6ceotavbfrl6nhl8k4.apps.googleusercontent.com" data-callback="handleSignIn"></div>
            <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
        </div>
    </nav>

    <div id="history-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] w-full max-w-2xl p-8 animate-modal shadow-2xl relative max-h-[85vh] flex flex-col">
            <button onclick="toggleHistory()" class="absolute top-6 right-6 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center font-bold hover:bg-gray-200">✕</button>
            <h2 class="text-3xl font-bold mb-2">ประวัติของคุณ 📁</h2>
            <p class="text-sm text-gray-500 mb-6">รวมรายการที่คุณเคยฝาก และเคยรับไปแล้ว</p>
            
            <div class="flex gap-4 mb-4 border-b border-gray-100 pb-2">
                <button onclick="showHistoryTab('given')" id="htab-given" class="font-bold text-indigo-600 border-b-2 border-indigo-600 pb-2 px-2">ของที่เคยฝาก</button>
                <button onclick="showHistoryTab('received')" id="htab-received" class="font-bold text-gray-400 pb-2 px-2">ของที่เคยรับ</button>
            </div>
            <div id="history-content" class="overflow-y-auto hide-scroll flex-1 space-y-4"></div>
        </div>
    </div>

    <main class="max-w-[1280px] mx-auto px-4 md:px-8 py-8">
        
        <div id="login-placeholder" class="text-center py-32">
            <h2 class="text-6xl md:text-8xl font-black tracking-tighter mb-6 bg-gradient-to-br from-gray-900 to-gray-400 bg-clip-text text-transparent">Give freely.<br>Take kindly.</h2>
        </div>

        <div id="app-content">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12">
                
                <div class="lg:col-span-4 lg:sticky lg:top-28 h-fit">
                    <div class="ios-card p-8">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-2xl font-bold tracking-tight flex items-center gap-2"><span class="text-2xl">🎁</span> ลงของฝาก</h3>
                            <button onclick="toggleHistory()" class="text-xs bg-gray-100 px-3 py-1.5 rounded-full font-bold hover:bg-gray-200">ดูประวัติ</button>
                        </div>
                        
                        <form id="post-form" onsubmit="handlePost(event)">
                            <div class="space-y-4">
                                <div class="relative group">
                                    <input type="file" id="itemImage" accept="image/*" class="hidden" onchange="previewImage(this)">
                                    <div onclick="document.getElementById('itemImage').click()" class="w-full h-48 bg-gray-50 border border-gray-200 rounded-[24px] flex flex-col items-center justify-center cursor-pointer hover:bg-gray-100 relative overflow-hidden">
                                        <div id="preview-placeholder" class="text-center"><span class="text-3xl block mb-2 opacity-60">📷</span></div>
                                        <img id="image-preview-el" class="hidden w-full h-full object-cover">
                                        <div id="remove-img" onclick="event.stopPropagation(); removeSelectedImg();" class="hidden absolute top-3 right-3 w-8 h-8 bg-black/60 text-white rounded-full flex items-center justify-center">✕</div>
                                    </div>
                                </div>
                                <input type="text" id="itemName" required class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-3.5 text-sm focus:border-indigo-500 outline-none" placeholder="ชื่อสิ่งของ...">
                                <select id="itemCat" class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-3.5 text-sm outline-none appearance-none">
                                    <option>📚 หนังสือเรียน / ชีทสรุป</option>
                                    <option>👕 เสื้อผ้า / ชุดนักเรียน / พละ</option>
                                    <option>✏️ อุปกรณ์การเรียน / เครื่องเขียน</option>
                                    <option>💻 อุปกรณ์ไอที / หูฟัง / เคส</option>
                                    <option>⚽ อุปกรณ์กีฬา</option>
                                    <option>🎸 งานอดิเรก / ดนตรี / ของเล่น</option>
                                    <option>📦 อื่นๆ</option>
                                </select>
                                <input type="text" id="itemContact" required class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-3.5 text-sm focus:border-indigo-500 outline-none" placeholder="ช่องทางติดต่อ (Line ID / เบอร์โทร)">
                                <textarea id="itemDetail" rows="2" required class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-3.5 text-sm outline-none focus:border-indigo-500 resize-none" placeholder="รายละเอียดจุดนัดรับ..."></textarea>
                                <button type="submit" class="w-full bg-gradient-to-r from-gray-900 to-gray-800 text-white font-bold py-4 rounded-2xl btn-ios shadow-lg">ประกาศหาเจ้าของใหม่</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <h3 class="text-3xl font-bold tracking-tight mb-4">กระดานแบ่งปัน</h3>
                    
                    <div class="flex overflow-x-auto hide-scroll gap-2 mb-6 pb-2" id="category-filters">
                        <button onclick="setFilter('ทั้งหมด')" class="cat-btn active">รวมทั้งหมด</button>
                        <button onclick="setFilter('📚')" class="cat-btn">📚 หนังสือ/ชีท</button>
                        <button onclick="setFilter('👕')" class="cat-btn">👕 เสื้อผ้า</button>
                        <button onclick="setFilter('✏️')" class="cat-btn">✏️ เครื่องเขียน</button>
                        <button onclick="setFilter('💻')" class="cat-btn">💻 ไอที</button>
                        <button onclick="setFilter('⚽')" class="cat-btn">⚽ กีฬา</button>
                        <button onclick="setFilter('📦')" class="cat-btn">📦 อื่นๆ</button>
                    </div>

                    <div id="feed" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
