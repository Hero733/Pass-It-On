<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass It On @ NTUN | iOS 27 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { font-family: 'Noto Sans Thai', sans-serif; }
        
        /* 🌑 ระบบ Dynamic Background */
        body { 
            background-color: #ffffff; 
            transition: background-color 0.8s cubic-bezier(0.2, 0, 0.2, 1);
            min-height: 200vh;
        }

        /* 🌫️ Misty Top Effect */
        .mist-overlay {
            position: sticky;
            top: 72px; 
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            z-index: 40;
            pointer-events: none;
            transition: background 0.8s;
        }

        /* 📱 iOS 27 Glassmorphism */
        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
        }

        /* 🖼️ Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .ios-card {
            border-radius: 45px;
            background: white;
            transition: all 0.6s cubic-bezier(0.15, 0.83, 0.66, 1);
            animation: float 6s ease-in-out infinite;
        }
        .ios-card:hover {
            transform: scale(1.02) !important;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.1);
            animation-play-state: paused;
        }

        /* 📸 Multi-Image Slider */
        .carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 12px;
            scrollbar-width: none;
        }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel-item {
            flex: 0 0 100%;
            scroll-snap-align: center;
            border-radius: 35px;
            height: 350px;
            object-fit: cover;
        }

        /* Text Sync Transition */
        .text-sync { transition: color 0.8s ease; }
        
        #app-content, #admin-panel { display: none; }
        .fade-in { animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-0 m-0">

    <nav class="sticky top-0 z-[100] glass-nav px-8 py-5 flex justify-between items-center transition-all">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 bg-black rounded-[15px] flex items-center justify-center text-white shadow-2xl">
                <span class="text-xl font-bold">P</span>
            </div>
            <div class="text-sync">
                <h1 class="text-xl font-bold tracking-tight">Pass It On</h1>
                <p class="text-[9px] font-bold uppercase tracking-widest opacity-50">NTUN Campus Hub</p>
            </div>
        </div>
        <div id="auth-section">
            <div id="g_id_onload" data-client_id="802485672001-m60k218jeo6ege6ceotavbfrl6nhl8k4.apps.googleusercontent.com" data-callback="handleSignIn"></div>
            <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
        </div>
    </nav>

    <div id="mist" class="mist-overlay"></div>

    <main class="max-w-[1300px] mx-auto px-6 py-12">
        
        <div id="login-placeholder" class="text-center py-40">
            <h2 class="text-6xl md:text-8xl font-black tracking-tighter mb-8 text-sync">The Future <br> of Giving.</h2>
            <p class="text-gray-400 text-xl">สัมผัสประสบการณ์ส่งต่อสิ่งของแบบ iOS 27</p>
        </div>

        <section id="admin-panel" class="mb-16 p-10 bg-black/5 rounded-[50px] border border-black/5 text-sync fade-in">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6">
                <div>
                    <h2 class="text-4xl font-black tracking-tighter mb-2">Control</h2>
                    <p class="text-sm opacity-60">ระบบจัดการสูงสุดของแอดมิน</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="clearAllData()" class="bg-rose-500 text-white px-8 py-4 rounded-3xl text-xs font-bold shadow-xl shadow-rose-200 active:scale-95 transition">ล้างกระดาน</button>
                    <div class="flex gap-2">
                        <input type="email" id="new-admin" placeholder="เพิ่มแอดมิน" class="bg-white/50 border border-black/5 px-6 py-4 rounded-3xl text-xs outline-none focus:bg-white transition-all">
                        <button onclick="addAdmin()" class="bg-black text-white px-6 py-4 rounded-3xl text-xs font-bold active:scale-95 transition">เพิ่ม</button>
                    </div>
                </div>
            </div>
            <div id="admin-stats" class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-10">
                </div>
        </section>

        <div id="app-content">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                
                <div class="lg:col-span-4 lg:sticky lg:top-32 h-fit">
                    <div class="bg-white p-8 rounded-[50px] shadow-2xl border border-black/5">
                        <h3 class="text-2xl font-black mb-8 tracking-tight">Post Something.</h3>
                        <form id="post-form" onsubmit="handlePost(event)">
                            <div class="space-y-6">
                                <div class="relative group">
                                    <input type="file" id="itemImages" accept="image/*" multiple class="hidden" onchange="previewImages(this)">
                                    <div onclick="document.getElementById('itemImages').click()" class="w-full h-52 bg-gray-50 border-2 border-dashed border-gray-200 rounded-[35px] flex flex-col items-center justify-center cursor-pointer hover:bg-black hover:text-white transition-all overflow-hidden relative">
                                        <div id="placeholder-info" class="text-center">
                                            <span class="text-4xl mb-2 block">📸</span>
                                            <p class="text-[10px] font-bold uppercase tracking-widest opacity-50">เลือกรูปภาพหลายรูป</p>
                                        </div>
                                        <div id="img-preview-row" class="hidden w-full h-full flex p-2 gap-2 overflow-x-auto"></div>
                                    </div>
                                </div>

                                <input type="text" id="itemName" required class="w-full bg-gray-50 border-none rounded-[20px] px-6 py-5 text-sm focus:bg-white focus:ring-4 ring-black/5 outline-none transition-all" placeholder="ชื่อสิ่งของ">
                                <textarea id="itemDetail" rows="3" required class="w-full bg-gray-50 border-none rounded-[20px] px-6 py-5 text-sm focus:bg-white focus:ring-4 ring-black/5 outline-none transition-all resize-none" placeholder="รายละเอียดและจุดนัดรับ..."></textarea>

                                <button type="submit" class="w-full bg-black text-white font-bold py-6 rounded-[28px] shadow-2xl hover:scale-105 active:scale-95 transition-all">
                                    แชร์ลง Feed
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div id="feed" class="flex flex-col gap-12 px-2">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const MASTER = "aceaa372@gmail.com";
        const DOMAIN = "ntun.ac.th";
        let posts = JSON.parse(localStorage.getItem('ntun_v6_posts')) || [];
        let admins = JSON.parse(localStorage.getItem('ntun_v6_admins')) || [MASTER];
        let currentUser = null;
        let tempImages = [];

        // --- 1. Dynamic Scroll Fusion ---
        window.addEventListener('scroll', () => {
            const scrollRatio = Math.min(window.scrollY / 1200, 1);
            const bgColorValue = Math.floor(255 - (scrollRatio * 255));
            const textColorValue = Math.floor(scrollRatio * 255);
            
            // เปลี่ยนสี Body
            document.body.style.backgroundColor = `rgb(${bgColorValue}, ${bgColorValue}, ${bgColorValue})`;
            
            // เปลี่ยนสีตัวหนังสือที่ระบุคลาส .text-sync
            const texts = document.querySelectorAll('.text-sync');
            texts.forEach(t => t.style.color = `rgb(${255 - bgColorValue}, ${255 - bgColorValue}, ${255 - bgColorValue})`);
            
            // เปลี่ยนสี Mist ให้เข้ากับพื้นหลัง
            const mist = document.getElementById('mist');
            mist.style.background = `linear-gradient(to bottom, rgb(${bgColorValue},${bgColorValue},${bgColorValue}) 0%, rgba(${bgColorValue},${bgColorValue},${bgColorValue},0) 100%)`;
        });

        // --- 2. Auth & User Profile (Thai Encoding Fix) ---
        function handleSignIn(response) {
            try {
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
                const payload = JSON.parse(new TextDecoder().decode(bytes));

                if (payload.hd === DOMAIN || payload.email === MASTER) {
                    currentUser = payload;
                    document.getElementById('auth-section').innerHTML = `<img src="${payload.picture}" class="w-11 h-11 rounded-full border-2 border-white shadow-lg active:scale-90 transition cursor-pointer" onclick="location.reload()">`;
                    unlock();
                } else {
                    alert("⚠️ ต้องใช้อีเมลโรงเรียน @ntun.ac.th เท่านั้น!");
                }
            } catch (e) { console.error("Auth Fail", e); }
        }

        function unlock() {
            document.getElementById('login-placeholder').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            if (admins.includes(currentUser.email)) document.getElementById('admin-panel').style.display = 'block';
            renderFeed();
            updateStats();
        }

        // --- 3. Multi-Image Carousel Logic ---
        async function previewImages(input) {
            const files = Array.from(input.files).slice(0, 5); // จำกัด 5 รูป
            tempImages = [];
            const previewRow = document.getElementById('img-preview-row');
            previewRow.innerHTML = '';
            
            for (let file of files) {
                const base64 = await compress(file);
                tempImages.push(base64);
                previewRow.innerHTML += `<img src="${base64}" class="h-full w-24 object-cover rounded-[20px] shadow-sm border-2 border-white">`;
            }
            
            previewRow.classList.remove('hidden');
            document.getElementById('placeholder-info').classList.add('hidden');
        }

        function compress(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxDim = 400; // บีบอัดให้เล็กลงมากเพื่อเก็บหลายรูปได้
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxDim) { h *= maxDim / w; w = maxDim; } }
                        else { if (h > maxDim) { w *= maxDim / h; h = maxDim; } }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.5));
                    }
                }
            });
        }

        // --- 4. Post & Feed Logic ---
        function handlePost(e) {
            e.preventDefault();
            const newPost = {
                id: Date.now(),
                user: currentUser.name,
                email: currentUser.email,
                avatar: currentUser.picture,
                name: document.getElementById('itemName').value,
                detail: document.getElementById('itemDetail').value,
                images: tempImages,
                status: 'available',
                reservedBy: null,
                date: new Date().toLocaleDateString('th-TH')
            };
            posts.unshift(newPost);
            save();
            renderFeed();
            e.target.reset();
            tempImages = [];
            document.getElementById('img-preview-row').classList.add('hidden');
            document.getElementById('placeholder-info').classList.remove('hidden');
            updateStats();
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            feed.innerHTML = posts.map(post => {
                const isOwner = post.email === currentUser.email;
                const isAdmin = admins.includes(currentUser.email);
                let cardState = "ios-card p-10";
                let actionBtn = `<button onclick="reserve(${post.id})" class="bg-black text-white px-8 py-3.5 rounded-3xl text-xs font-bold active:scale-95 transition">สนใจจอง</button>`;

                if (post.status === 'reserved') {
                    cardState += " opacity-60 grayscale border-4 border-gray-100";
                    actionBtn = isOwner ? 
                        `<button onclick="complete(${post.id})" class="bg-emerald-500 text-white px-8 py-3.5 rounded-3xl text-xs font-bold animate-pulse">ส่งของแล้ว</button>` : 
                        `<span class="text-xs font-bold text-gray-400 bg-gray-50 px-6 py-3 rounded-2xl">ถูกจองโดย ${post.reservedBy}</span>`;
                } else if (post.status === 'completed') {
                    cardState += " opacity-30 grayscale scale-95";
                    actionBtn = `<span class="text-xs font-black text-emerald-500">✓ DELIVERED</span>`;
                }

                return `
                <div class="${cardState}">
                    ${post.images.length > 0 ? `
                        <div class="carousel mb-10">
                            ${post.images.map(img => `<img src="${img}" class="carousel-item">`).join('')}
                        </div>
                    ` : ''}
                    
                    <div class="flex justify-between items-start mb-6">
                        <h4 class="text-3xl font-black tracking-tighter leading-tight">${post.name}</h4>
                        <div class="flex items-center gap-2">
                            ${isAdmin || isOwner ? `<button onclick="del(${post.id})" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition-all">🗑️</button>` : ''}
                        </div>
                    </div>
                    
                    <p class="text-gray-500 text-base mb-10 leading-relaxed">${post.detail}</p>
                    
                    <div class="flex items-center justify-between pt-8 border-t border-gray-50">
                        <div class="flex items-center gap-3">
                            <img src="${post.avatar}" class="w-9 h-9 rounded-full">
                            <div>
                                <p class="text-[11px] font-black">${post.user}</p>
                                <p class="text-[9px] text-gray-400 uppercase tracking-widest">${post.date}</p>
                            </div>
                        </div>
                        ${actionBtn}
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- 5. System Functions ---
        function reserve(id) {
            const p = posts.find(x => x.id === id);
            if(p.email === currentUser.email) return alert("จองของตัวเองไม่ได้นะ!");
            if(confirm("ยืนยันการจอง? รายการจะเปลี่ยนเป็นสีขาวทึบและคนอื่นจะจองไม่ได้จนกว่าเจ้าของจะส่งของ")) {
                p.status = 'reserved';
                p.reservedBy = currentUser.name;
                save(); renderFeed(); updateStats();
            }
        }

        function complete(id) {
            if(confirm("คุณส่งมอบของชิ้นนี้ให้เพื่อนเรียบร้อยแล้วใช่ไหม?")) {
                posts.find(x => x.id === id).status = 'completed';
                save(); renderFeed(); updateStats();
            }
        }

        function del(id) {
            if(confirm("ลบโพสต์นี้ถาวร?")) {
                posts = posts.filter(x => x.id !== id);
                save(); renderFeed(); updateStats();
            }
        }

        function clearAllData() {
            if(confirm("⚠️ ลบข้อมูลทั้งหมดบนเครื่องนี้?")) {
                posts = [];
                save(); renderFeed(); updateStats();
            }
        }

        function addAdmin() {
            const email = document.getElementById('new-admin').value.trim().toLowerCase();
            if(email && !admins.includes(email)) {
                admins.push(email);
                localStorage.setItem('ntun_v6_admins', JSON.stringify(admins));
                updateStats();
                document.getElementById('new-admin').value = "";
            }
        }

        function updateStats() {
            const stats = document.getElementById('admin-stats');
            const counts = { 
                all: posts.length, 
                wait: posts.filter(p => p.status === 'reserved').length,
                done: posts.filter(p => p.status === 'completed').length,
                adm: admins.length
            };
            stats.innerHTML = `
                <div class="bg-white/40 p-6 rounded-[30px] border border-black/5">
                    <p class="text-[9px] font-black uppercase opacity-40">Total</p>
                    <p class="text-3xl font-black">${counts.all}</p>
                </div>
                <div class="bg-orange-50/40 p-6 rounded-[30px] border border-orange-100">
                    <p class="text-[9px] font-black uppercase text-orange-400">Waiting</p>
                    <p class="text-3xl font-black text-orange-500">${counts.wait}</p>
                </div>
                <div class="bg-emerald-50/40 p-6 rounded-[30px] border border-emerald-100">
                    <p class="text-[9px] font-black uppercase text-emerald-400">Success</p>
                    <p class="text-3xl font-black text-emerald-500">${counts.done}</p>
                </div>
                <div class="bg-blue-50/40 p-6 rounded-[30px] border border-blue-100">
                    <p class="text-[9px] font-black uppercase text-blue-400">Admins</p>
                    <p class="text-3xl font-black text-blue-500">${counts.adm}</p>
                </div>
            `;
        }

        function save() { localStorage.setItem('ntun_v6_posts', JSON.stringify(posts)); }

    </script>
</body>
</html>
